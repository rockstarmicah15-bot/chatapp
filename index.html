<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireChat · Zenith OS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --surface: rgba(255,255,255,0.03);
    --surface-2: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.07);
    --border-2: rgba(255,255,255,0.12);
    --text: #E8E3FF;
    --text-dim: rgba(232,227,255,0.4);
    --text-dimmer: rgba(232,227,255,0.2);
    --accent: #A78BFA;
    --accent-2: #7C3AED;
    --accent-glow: rgba(167,139,250,0.25);
    --accent-glow-2: rgba(167,139,250,0.08);
    --me-bubble: rgba(167,139,250,0.12);
    --them-bubble: rgba(255,255,255,0.04);
    --danger: #F87171;
    --success: #34D399;
    --radius: 24px;
    --radius-msg: 20px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --transition: cubic-bezier(0.16, 1, 0.3, 1);
  }

  body.theme-rose {
    --accent: #FB7185; --accent-2: #E11D48;
    --accent-glow: rgba(251,113,133,0.25); --accent-glow-2: rgba(251,113,133,0.08);
    --me-bubble: rgba(251,113,133,0.1); --text: #FFE4E6;
  }
  body.theme-emerald {
    --accent: #34D399; --accent-2: #059669;
    --accent-glow: rgba(52,211,153,0.25); --accent-glow-2: rgba(52,211,153,0.08);
    --me-bubble: rgba(52,211,153,0.1); --text: #ECFDF5;
  }
  body.theme-amber {
    --accent: #FBBF24; --accent-2: #D97706;
    --accent-glow: rgba(251,191,36,0.25); --accent-glow-2: rgba(251,191,36,0.08);
    --me-bubble: rgba(251,191,36,0.1); --text: #FFFBEB;
  }
  body.theme-cyan {
    --accent: #22D3EE; --accent-2: #0891B2;
    --accent-glow: rgba(34,211,238,0.25); --accent-glow-2: rgba(34,211,238,0.08);
    --me-bubble: rgba(34,211,238,0.1); --text: #ECFEFF;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── AURA BG ─── */
  .aura-bg {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }
  .aura-orb {
    position: absolute; border-radius: 50%; filter: blur(120px);
    animation: auraFloat 12s ease-in-out infinite alternate;
  }
  .aura-orb:nth-child(1) {
    width: 600px; height: 600px; top: -200px; left: -150px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    animation-duration: 14s;
  }
  .aura-orb:nth-child(2) {
    width: 500px; height: 500px; bottom: -100px; right: -100px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    animation-duration: 10s; animation-delay: -5s;
  }
  .aura-orb:nth-child(3) {
    width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: radial-gradient(circle, var(--accent-glow-2) 0%, transparent 70%);
    animation-duration: 18s; animation-delay: -3s;
  }
  @keyframes auraFloat {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(40px, 30px) scale(1.1); }
  }

  /* ─── NOISE GRAIN ─── */
  .noise-overlay {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ─── AUTH ─── */
  #authScreen {
    position: fixed; inset: 0; z-index: 5000;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    transition: opacity 0.6s var(--transition);
  }
  #authScreen.fade-out { opacity: 0; pointer-events: none; }

  .auth-card {
    width: 100%; max-width: 420px; padding: 0 28px;
    animation: authReveal 0.8s var(--transition) both;
  }
  @keyframes authReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .auth-logo {
    font-family: var(--font-display);
    font-size: 72px; font-weight: 800;
    color: var(--accent);
    letter-spacing: -4px;
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 0 80px var(--accent-glow);
  }
  .auth-tagline {
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.25em;
    color: var(--text-dimmer); text-transform: uppercase;
    margin-bottom: 60px;
  }

  .auth-tabs {
    display: flex; gap: 0; margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
  }
  .auth-tab {
    padding: 12px 24px; cursor: pointer;
    font-size: 13px; font-weight: 600;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.3s;
    margin-bottom: -1px;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: var(--font-body);
  }
  .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .auth-field {
    position: relative; margin-bottom: 20px;
  }
  .auth-field label {
    display: block; font-size: 10px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dimmer); margin-bottom: 10px;
    font-family: var(--font-mono);
  }
  .auth-field input {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; font-size: 15px;
    color: var(--text); outline: none;
    font-family: var(--font-body);
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  }
  .auth-field input:focus {
    border-color: var(--accent);
    background: var(--surface-2);
    box-shadow: 0 0 0 4px var(--accent-glow-2);
  }

  .btn-primary {
    width: 100%; padding: 17px;
    background: var(--accent); color: #0A0A12;
    border: none; border-radius: 14px; cursor: pointer;
    font-family: var(--font-display); font-size: 15px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: all 0.3s var(--transition);
    box-shadow: 0 8px 32px var(--accent-glow);
    position: relative; overflow: hidden;
  }
  .btn-primary::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px var(--accent-glow); }
  .btn-primary:hover::after { opacity: 1; }
  .btn-primary:active { transform: translateY(0); }

  .auth-error {
    font-size: 12px; color: var(--danger);
    margin-top: 14px; text-align: center;
    font-family: var(--font-mono);
    min-height: 18px;
  }

  /* ─── APP LAYOUT ─── */
  #app {
    display: none; flex-direction: column;
    height: 100dvh; width: 100%; max-width: 900px;
    position: relative; z-index: 10;
  }
  #app.visible { display: flex; }

  /* ─── HEADER ─── */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px; shrink: 0;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(5,5,8,0.7);
    animation: slideDown 0.5s var(--transition) both;
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } }

  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 800;
    letter-spacing: -1px; color: var(--text);
  }
  .header-logo span { color: var(--accent); }
  .header-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 100px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 11px; font-weight: 500; color: var(--text-dim);
    font-family: var(--font-mono);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .icon-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-size: 16px;
    color: var(--text-dim);
  }
  .icon-btn:hover { background: var(--surface-2); border-color: var(--border-2); color: var(--text); transform: scale(1.05); }

  .header-user {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px 6px 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px;
  }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #0A0A12;
    background: var(--accent);
    flex-shrink: 0;
  }
  .user-name {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    font-family: var(--font-mono);
  }

  /* ─── SEARCH BAR ─── */
  .search-bar {
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,5,8,0.7);
    backdrop-filter: blur(20px);
    display: none;
  }
  .search-bar.visible { display: flex; animation: slideDown 0.3s var(--transition); }
  .search-input {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 16px 10px 40px; font-size: 14px;
    color: var(--text); outline: none;
    font-family: var(--font-body);
    position: relative;
    transition: border-color 0.3s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-wrap { position: relative; flex: 1; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dimmer); font-size: 14px; pointer-events: none; }

  /* ─── MESSAGES ─── */
  #messages {
    flex: 1; overflow-y: auto; padding: 28px;
    display: flex; flex-direction: column; gap: 6px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }

  .msg-group { display: flex; flex-direction: column; }
  .msg-group.me { align-items: flex-end; }
  .msg-group.them { align-items: flex-start; }

  .msg-sender {
    font-size: 11px; font-weight: 600;
    color: var(--text-dimmer); letter-spacing: 0.1em;
    margin-bottom: 6px; padding: 0 12px;
    font-family: var(--font-mono);
    display: flex; align-items: center; gap: 8px;
  }
  .msg-sender .mini-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); color: #0A0A12;
    font-size: 9px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    max-width: 72%;
    animation: msgIn 0.35s var(--transition) both;
  }
  .msg-group.me .msg-row { flex-direction: row-reverse; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg-bubble {
    padding: 12px 17px;
    border-radius: var(--radius-msg);
    font-size: 15px; line-height: 1.55;
    position: relative;
    word-break: break-word;
    transition: all 0.2s;
  }
  .msg-group.me .msg-bubble {
    background: var(--me-bubble);
    border: 1px solid rgba(167,139,250,0.2);
    color: var(--text);
    border-bottom-right-radius: 6px;
  }
  .msg-group.them .msg-bubble {
    background: var(--them-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .msg-bubble:hover { border-color: var(--border-2); }

  .msg-bubble img {
    max-width: 240px; border-radius: 14px; display: block;
  }

  .msg-meta {
    display: flex; align-items: center; gap: 6px;
    margin-top: 4px; padding: 0 4px;
  }
  .msg-time {
    font-size: 10px; color: var(--text-dimmer);
    font-family: var(--font-mono);
  }
  .msg-group.me .msg-meta { flex-direction: row-reverse; }

  /* Reaction button on hover */
  .msg-actions {
    display: flex; gap: 4px; align-items: center;
    opacity: 0; transition: opacity 0.2s;
    flex-direction: row;
  }
  .msg-row:hover .msg-actions { opacity: 1; }
  .msg-group.me .msg-actions { flex-direction: row-reverse; }

  .action-btn {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-size: 12px;
    color: var(--text-dim);
  }
  .action-btn:hover { background: var(--surface-2); border-color: var(--accent); color: var(--accent); transform: scale(1.1); }

  /* Reactions display */
  .msg-reactions {
    display: flex; gap: 4px; flex-wrap: wrap;
    margin-top: 6px;
  }
  .reaction-chip {
    padding: 3px 8px; border-radius: 100px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 13px; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; gap: 4px;
  }
  .reaction-chip:hover { border-color: var(--accent); transform: scale(1.05); }
  .reaction-chip .count { font-size: 10px; color: var(--text-dim); }
  .reaction-chip.mine { border-color: var(--accent); background: var(--accent-glow-2); }

  /* Reply bubble */
  .reply-preview {
    padding: 8px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border-left: 2px solid var(--accent);
    margin-bottom: 6px; font-size: 12px;
    color: var(--text-dim); max-width: 200px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Date divider */
  .date-divider {
    display: flex; align-items: center; gap: 16px;
    margin: 20px 0 10px;
  }
  .date-divider::before, .date-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .date-divider span {
    font-size: 10px; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--text-dimmer);
    font-family: var(--font-mono);
    white-space: nowrap;
  }

  /* ─── TYPING INDICATOR ─── */
  #typingIndicator {
    padding: 0 28px 8px;
    font-size: 12px; color: var(--text-dimmer);
    font-family: var(--font-mono);
    min-height: 24px; display: flex; align-items: center; gap: 8px;
  }
  .typing-dots {
    display: flex; gap: 3px; align-items: center;
  }
  .typing-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ─── SCROLL TO BOTTOM ─── */
  #scrollBtn {
    position: absolute; bottom: 120px; right: 28px;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); color: #0A0A12;
    border: none; cursor: pointer; font-size: 16px;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px var(--accent-glow);
    transition: all 0.3s; z-index: 100;
  }
  #scrollBtn.visible { display: flex; animation: popIn 0.3s var(--transition); }
  @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
  #scrollBtn:hover { transform: scale(1.1); }

  /* ─── REPLY INDICATOR ─── */
  #replyBar {
    display: none; align-items: center; gap: 12px;
    padding: 10px 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    animation: slideUp 0.3s var(--transition);
  }
  #replyBar.visible { display: flex; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } }
  .reply-bar-line {
    width: 3px; height: 36px; border-radius: 10px; background: var(--accent); flex-shrink: 0;
  }
  .reply-bar-content { flex: 1; }
  .reply-bar-name { font-size: 11px; font-weight: 700; color: var(--accent); font-family: var(--font-mono); }
  .reply-bar-text { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }

  /* ─── COMPOSER ─── */
  .composer {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    background: rgba(5,5,8,0.8);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .composer-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    transition: all 0.3s var(--transition);
    position: relative;
    overflow: hidden;
  }
  .composer-box::before {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 200%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transition: left 0.6s;
  }
  .composer-box.focused { border-color: var(--accent); background: var(--surface-2); box-shadow: 0 0 0 3px var(--accent-glow-2); }
  .composer-box.focused::before { left: 100%; }

  .composer-input {
    width: 100%; background: transparent; border: none;
    padding: 16px 20px 4px; font-size: 15px;
    color: var(--text); outline: none; resize: none;
    font-family: var(--font-body); line-height: 1.5;
    max-height: 140px; overflow-y: auto;
  }
  .composer-input::placeholder { color: var(--text-dimmer); }
  .composer-input::-webkit-scrollbar { width: 3px; }
  .composer-input::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }

  .composer-toolbar {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 8px 16px 12px;
  }
  .composer-tools { display: flex; gap: 4px; }

  .tool-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: transparent; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-size: 16px;
    color: var(--text-dimmer);
  }
  .tool-btn:hover { background: var(--surface-2); color: var(--text-dim); transform: scale(1.05); }

  .send-btn {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--accent); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s var(--transition);
    color: #0A0A12; font-size: 16px;
    box-shadow: 0 4px 16px var(--accent-glow);
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.08) rotate(-5deg); box-shadow: 0 8px 24px var(--accent-glow); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ─── EMOJI PICKER ─── */
  #emojiPicker {
    position: absolute; bottom: calc(100% + 12px); left: 0;
    width: 340px; height: 360px;
    background: rgba(8,8,14,0.98); backdrop-filter: blur(40px);
    border: 1px solid var(--border); border-radius: 24px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    z-index: 1000; overflow: hidden;
    display: none;
    animation: popIn 0.3s var(--transition);
  }
  #emojiPicker.visible { display: flex; flex-direction: column; }
  .emoji-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .emoji-search input {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; font-size: 13px;
    color: var(--text); outline: none; font-family: var(--font-body);
  }
  .emoji-categories {
    display: flex; gap: 2px; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .emoji-cat-btn {
    padding: 4px 10px; border-radius: 8px; cursor: pointer;
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    background: transparent; border: 1px solid transparent;
    transition: all 0.2s; white-space: nowrap; font-family: var(--font-body);
  }
  .emoji-cat-btn.active { background: var(--surface-2); border-color: var(--accent); color: var(--accent); }
  .emoji-grid-wrap {
    flex: 1; overflow-y: auto; padding: 10px 12px;
  }
  .emoji-grid-wrap::-webkit-scrollbar { width: 3px; }
  .emoji-grid-wrap::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
  .emoji-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
  }
  .emoji-item {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; transition: all 0.15s;
  }
  .emoji-item:hover { background: var(--surface-2); transform: scale(1.3); }

  /* ─── GIF PICKER ─── */
  #gifPicker {
    position: absolute; bottom: calc(100% + 12px); left: 44px;
    width: 340px; height: 360px;
    background: rgba(8,8,14,0.98); backdrop-filter: blur(40px);
    border: 1px solid var(--border); border-radius: 24px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    z-index: 1000; overflow: hidden;
    display: none;
    animation: popIn 0.3s var(--transition);
  }
  #gifPicker.visible { display: flex; flex-direction: column; }
  .gif-search {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .gif-search input {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 14px;
    color: var(--text); outline: none; font-family: var(--font-body);
  }
  .gif-search input::placeholder { color: var(--text-dimmer); }
  .gif-grid {
    flex: 1; overflow-y: auto; padding: 12px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .gif-grid::-webkit-scrollbar { width: 3px; }
  .gif-grid::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
  .gif-item { border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; aspect-ratio: 1; }
  .gif-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gif-item:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }

  /* ─── THEME PICKER ─── */
  #themePicker {
    position: absolute; bottom: calc(100% + 12px); right: 0;
    background: rgba(8,8,14,0.98); backdrop-filter: blur(40px);
    border: 1px solid var(--border); border-radius: 16px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    z-index: 1000; padding: 14px;
    display: none; gap: 8px;
    animation: popIn 0.3s var(--transition);
  }
  #themePicker.visible { display: flex; }
  .theme-swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    transition: all 0.2s; border: 2px solid transparent;
  }
  .theme-swatch:hover { transform: scale(1.2); border-color: white; }
  .theme-swatch.active { border-color: white; transform: scale(1.15); }

  /* ─── REACTION PICKER ─── */
  .reaction-picker {
    position: absolute;
    background: rgba(8,8,14,0.98); backdrop-filter: blur(40px);
    border: 1px solid var(--border); border-radius: 100px;
    padding: 6px 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    z-index: 500; display: flex; gap: 4px;
    animation: popIn 0.2s var(--transition);
    pointer-events: all;
  }
  .r-emoji {
    font-size: 20px; cursor: pointer; padding: 4px 6px; border-radius: 8px; transition: 0.15s;
  }
  .r-emoji:hover { background: var(--surface-2); transform: scale(1.4); }

  /* ─── DELETE CONFIRM ─── */
  .del-btn {
    font-size: 11px; color: var(--danger); cursor: pointer;
    font-family: var(--font-mono); font-weight: 600;
    opacity: 0; transition: opacity 0.2s;
    background: none; border: none; padding: 0;
  }
  .msg-row:hover .del-btn { opacity: 1; }

  /* EMPTY STATE */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--text-dimmer);
    text-align: center; padding: 40px;
  }
  .empty-icon { font-size: 48px; }
  .empty-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-dim); }
  .empty-sub { font-size: 13px; font-family: var(--font-mono); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface-2); border: 1px solid var(--border-2);
    border-radius: 100px; padding: 10px 20px;
    font-size: 13px; font-weight: 500; color: var(--text);
    z-index: 9999; opacity: 0; transition: all 0.3s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* COMPOSER POSITION */
  .composer-inner { position: relative; }

  @keyframes shimmer {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
  }
  .loading-msg { animation: shimmer 1.5s infinite; }
</style>
</head>
<body>

<div class="aura-bg">
  <div class="aura-orb"></div>
  <div class="aura-orb"></div>
  <div class="aura-orb"></div>
</div>
<div class="noise-overlay"></div>
<div id="toast"></div>

<!-- ─── AUTH ─── -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">FIRE<br>CHAT</div>
    <div class="auth-tagline">v3.0 · Zenith OS · Encrypted</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>
    <div class="auth-field">
      <label>Email Address</label>
      <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="authPass" placeholder="••••••••••" autocomplete="current-password">
    </div>
    <div class="auth-field" id="confirmField" style="display:none">
      <label>Confirm Password</label>
      <input type="password" id="authConfirm" placeholder="••••••••••">
    </div>
    <button class="btn-primary" id="authBtn" onclick="handleAuth()">Initialize Session</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- ─── APP ─── -->
<div id="app">
  <header class="app-header">
    <div class="header-left">
      <div class="header-logo">Fire<span>Chat</span></div>
      <div class="header-badge">
        <div class="status-dot"></div>
        <span id="onlineCount">Connecting...</span>
      </div>
    </div>
    <div class="header-right">
      <div class="icon-btn" onclick="toggleSearch()" title="Search">🔍</div>
      <div class="header-user">
        <div class="user-avatar" id="headerAvatar">?</div>
        <div class="user-name" id="headerName">—</div>
      </div>
      <div class="icon-btn" onclick="doSignOut()" title="Sign out" style="color:var(--danger)">⏻</div>
    </div>
  </header>

  <div class="search-bar" id="searchBar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Search messages..." oninput="filterMessages(this.value)">
    </div>
  </div>

  <div id="messages"></div>

  <div id="typingIndicator"></div>

  <button id="scrollBtn" onclick="scrollToBottom()">↓</button>

  <div id="replyBar">
    <div class="reply-bar-line"></div>
    <div class="reply-bar-content">
      <div class="reply-bar-name" id="replyBarName"></div>
      <div class="reply-bar-text" id="replyBarText"></div>
    </div>
    <div class="icon-btn" onclick="cancelReply()" style="margin-left:auto">✕</div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <div id="emojiPicker">
        <div class="emoji-search">
          <input placeholder="Search emojis..." id="emojiSearch" oninput="filterEmojis(this.value)">
        </div>
        <div class="emoji-categories" id="emojiCats"></div>
        <div class="emoji-grid-wrap">
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>
      </div>
      <div id="gifPicker">
        <div class="gif-search">
          <input placeholder="Search GIFs..." id="gifSearchInput" oninput="searchGifs(this.value)">
        </div>
        <div class="gif-grid" id="gifGrid"></div>
      </div>
      <div id="themePicker">
        <div class="theme-swatch active" style="background:linear-gradient(135deg,#A78BFA,#7C3AED)" data-theme="default" onclick="setTheme('default',this)" title="Violet"></div>
        <div class="theme-swatch" style="background:linear-gradient(135deg,#FB7185,#E11D48)" data-theme="rose" onclick="setTheme('rose',this)" title="Rose"></div>
        <div class="theme-swatch" style="background:linear-gradient(135deg,#34D399,#059669)" data-theme="emerald" onclick="setTheme('emerald',this)" title="Emerald"></div>
        <div class="theme-swatch" style="background:linear-gradient(135deg,#FBBF24,#D97706)" data-theme="amber" onclick="setTheme('amber',this)" title="Amber"></div>
        <div class="theme-swatch" style="background:linear-gradient(135deg,#22D3EE,#0891B2)" data-theme="cyan" onclick="setTheme('cyan',this)" title="Cyan"></div>
      </div>

      <div class="composer-box" id="composerBox">
        <textarea class="composer-input" id="msgInput" rows="1"
          placeholder="Message the channel..."
          oninput="handleInput(this)" onkeydown="handleKey(event)"></textarea>
        <div class="composer-toolbar">
          <div class="composer-tools">
            <button class="tool-btn" onclick="togglePicker('emojiPicker')" title="Emoji">😊</button>
            <button class="tool-btn" onclick="togglePicker('gifPicker')" title="GIF">✨</button>
            <button class="tool-btn" onclick="togglePicker('themePicker')" title="Theme">🎨</button>
          </div>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            ↑
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, collection, addDoc, query, orderBy, onSnapshot,
  serverTimestamp, deleteDoc, doc, setDoc, getDoc, updateDoc,
  arrayUnion, arrayRemove, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSNJW_8Fq2VWij8hEZg0QnsXfz0BTbqNE",
  authDomain: "chat-app-bc773.firebaseapp.com",
  projectId: "chat-app-bc773",
  storageBucket: "chat-app-bc773.firebasestorage.app",
  messagingSenderId: "266209413582",
  appId: "1:266209413582:web:e8d9ddec4dd5007663839f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const TENOR_KEY = "AIzaSyDVGpa-xoE0MbB272-ZYL_mk3lK1AMKpRY";

// ─── STATE ───
let currentUser = null;
let replyTo = null;
let allMessages = [];
let typingTimeout = null;
let reactionPickerOpen = null;

// ─── AUDIO ENGINE ───
function playSound(type) {
  try {
    const ctx = new AudioContext();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (type === 'send') {
      o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
      g.gain.setValueAtTime(0.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    } else if (type === 'receive') {
      o.frequency.setValueAtTime(440, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.08, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    }
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

// ─── AUTH ───
let authMode = 'login';
window.switchTab = (mode) => {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && mode==='login') || (i===1 && mode==='signup'));
  });
  document.getElementById('confirmField').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('authBtn').textContent = mode === 'signup' ? 'Create Account' : 'Initialize Session';
  document.getElementById('authError').textContent = '';
};

window.handleAuth = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  const confirm = document.getElementById('authConfirm').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Please fill all fields.'; return; }
  if (authMode === 'signup' && pass !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }
  try {
    if (authMode === 'signup') await createUserWithEmailAndPassword(auth, email, pass);
    else await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.textContent = e.message.replace('Firebase: ', '').replace(/\(.*\)/, '').trim();
  }
};

document.getElementById('authEmail').addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); });
document.getElementById('authPass').addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); });
document.getElementById('authConfirm').addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); });

window.doSignOut = async () => {
  await setDoc(doc(db, 'presence', currentUser.uid), { typing: false, online: false }, { merge: true });
  await auth.signOut();
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    const name = user.email.split('@')[0];
    document.getElementById('headerAvatar').textContent = name[0].toUpperCase();
    document.getElementById('headerName').textContent = name;
    document.getElementById('authScreen').classList.add('fade-out');
    setTimeout(() => { document.getElementById('authScreen').style.display = 'none'; }, 600);
    document.getElementById('app').classList.add('visible');
    await setDoc(doc(db, 'presence', user.uid), { email: user.email, online: true, typing: false }, { merge: true });
    initPresence();
    loadMessages();
    loadEmojis();
    loadGifs('trending');
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('authScreen').classList.remove('fade-out');
    document.getElementById('app').classList.remove('visible');
  }
});

// ─── PRESENCE ───
function initPresence() {
  onSnapshot(collection(db, 'presence'), snap => {
    const online = snap.docs.filter(d => d.data().online).length;
    document.getElementById('onlineCount').textContent = `${online} online`;
    const typing = snap.docs
      .filter(d => d.data().typing && d.data().email !== currentUser.email)
      .map(d => d.data().email.split('@')[0]);
    const ti = document.getElementById('typingIndicator');
    if (typing.length > 0) {
      ti.innerHTML = `<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span>${typing[0]} is typing</span>`;
    } else {
      ti.innerHTML = '';
    }
  });
}

// ─── MESSAGES ───
function loadMessages() {
  onSnapshot(query(collection(db, 'messages'), orderBy('createdAt', 'asc')), snap => {
    const wasAtBottom = isAtBottom();
    const prev = allMessages.length;
    allMessages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMessages(allMessages);
    if (wasAtBottom || allMessages.length === prev + 1) {
      scrollToBottom();
      if (allMessages.length > prev && allMessages[allMessages.length-1]?.user !== currentUser.email) {
        playSound('receive');
      }
    }
  });
}

function isAtBottom() {
  const el = document.getElementById('messages');
  return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
}

window.scrollToBottom = () => {
  const el = document.getElementById('messages');
  el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
};

document.getElementById('messages').addEventListener('scroll', () => {
  const btn = document.getElementById('scrollBtn');
  btn.classList.toggle('visible', !isAtBottom());
});

function renderMessages(msgs) {
  const box = document.getElementById('messages');
  if (msgs.length === 0) {
    box.innerHTML = `<div class="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-title">No messages yet</div>
      <div class="empty-sub">Be the first to say something</div>
    </div>`;
    return;
  }
  let html = '';
  let lastDate = '';
  let lastUser = '';
  msgs.forEach((m, i) => {
    const isMe = m.user === currentUser.email;
    const name = m.user ? m.user.split('@')[0] : 'unknown';
    const ts = m.createdAt?.toDate ? m.createdAt.toDate() : new Date();
    const timeStr = ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const dateStr = ts.toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });

    if (dateStr !== lastDate) {
      html += `<div class="date-divider"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
      lastUser = '';
    }

    const showSender = m.user !== lastUser;
    lastUser = m.user;

    const reactions = m.reactions || {};
    const reactionHtml = Object.entries(reactions).map(([emoji, users]) => {
      if (!users || users.length === 0) return '';
      const mine = users.includes(currentUser.uid);
      return `<div class="reaction-chip ${mine?'mine':''}" onclick="toggleReaction('${m.id}','${emoji}')">
        ${emoji}<span class="count">${users.length}</span>
      </div>`;
    }).join('');

    let replyHtml = '';
    if (m.replyTo) {
      replyHtml = `<div class="reply-preview">↩ ${m.replyTo.user?.split('@')[0]}: ${escHtml(m.replyTo.text || '').slice(0,60)}</div>`;
    }

    const content = m.type === 'gif'
      ? `<img src="${escHtml(m.text)}" loading="lazy" style="max-width:200px;border-radius:14px">`
      : escHtml(m.text).replace(/\n/g,'<br>');

    html += `
    <div class="msg-group ${isMe?'me':'them'}" data-text="${escHtml(m.text).toLowerCase()}">
      ${showSender && !isMe ? `<div class="msg-sender">
        <div class="mini-avatar">${name[0].toUpperCase()}</div>${name}
      </div>` : ''}
      <div class="msg-row" data-id="${m.id}">
        <div class="msg-actions">
          <div class="action-btn" onclick="openReactionPicker('${m.id}', this)">😊</div>
          <div class="action-btn" onclick="setReply('${m.id}', '${escHtml(m.user)}', '${escHtml(m.text || '').slice(0,80)}')" title="Reply">↩</div>
          ${isMe ? `<button class="del-btn" onclick="delMsg('${m.id}')">delete</button>` : ''}
        </div>
        <div class="msg-bubble" id="bubble-${m.id}">
          ${replyHtml}
          ${content}
        </div>
      </div>
      ${reactionHtml ? `<div class="msg-reactions">${reactionHtml}</div>` : ''}
      <div class="msg-meta">
        <span class="msg-time">${timeStr}</span>
      </div>
    </div>`;
  });
  box.innerHTML = html;
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ─── SEARCH ───
window.toggleSearch = () => {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('visible');
  if (bar.classList.contains('visible')) document.getElementById('searchInput').focus();
  else { document.getElementById('searchInput').value = ''; renderMessages(allMessages); }
};

window.filterMessages = (q) => {
  const filtered = q ? allMessages.filter(m => (m.text||'').toLowerCase().includes(q.toLowerCase())) : allMessages;
  renderMessages(filtered);
};

// ─── SEND ───
window.sendMessage = async (val = null, type = 'text') => {
  const input = document.getElementById('msgInput');
  const text = val || input.value.trim();
  if (!text) return;
  const payload = { text, type, user: currentUser.email, uid: currentUser.uid, createdAt: serverTimestamp(), reactions: {} };
  if (replyTo) { payload.replyTo = replyTo; cancelReply(); }
  input.value = '';
  handleInput(input);
  document.getElementById('sendBtn').disabled = true;
  closeAllPickers();
  clearTypingIndicator();
  playSound('send');
  await addDoc(collection(db, 'messages'), payload);
};

window.delMsg = async (id) => {
  if (!confirm('Delete this message?')) return;
  await deleteDoc(doc(db, 'messages', id));
  showToast('Message deleted');
};

// ─── REACTIONS ───
window.openReactionPicker = (msgId, btn) => {
  document.querySelectorAll('.reaction-picker').forEach(el => el.remove());
  if (reactionPickerOpen === msgId) { reactionPickerOpen = null; return; }
  reactionPickerOpen = msgId;
  const picker = document.createElement('div');
  picker.className = 'reaction-picker';
  picker.innerHTML = ['❤️','😂','😮','😢','👍','🔥','🎉','💯'].map(e =>
    `<div class="r-emoji" onclick="addReaction('${msgId}','${e}');this.closest('.reaction-picker').remove()">${e}</div>`
  ).join('');
  const row = document.querySelector(`[data-id="${msgId}"]`);
  if (!row) return;
  row.parentElement.style.position = 'relative';
  row.parentElement.appendChild(picker);
  picker.style.bottom = '100%';
  setTimeout(() => document.addEventListener('click', function handler() {
    picker.remove(); reactionPickerOpen = null;
    document.removeEventListener('click', handler);
  }), 100);
};

window.toggleReaction = async (msgId, emoji) => {
  const ref = doc(db, 'messages', msgId);
  const snap = await getDoc(ref);
  const data = snap.data();
  const reactions = data.reactions || {};
  const users = reactions[emoji] || [];
  if (users.includes(currentUser.uid)) {
    await updateDoc(ref, { [`reactions.${emoji}`]: arrayRemove(currentUser.uid) });
  } else {
    await updateDoc(ref, { [`reactions.${emoji}`]: arrayUnion(currentUser.uid) });
  }
};

window.addReaction = async (msgId, emoji) => {
  const ref = doc(db, 'messages', msgId);
  await updateDoc(ref, { [`reactions.${emoji}`]: arrayUnion(currentUser.uid) }).catch(() => {
    setDoc(ref, { reactions: { [emoji]: [currentUser.uid] } }, { merge: true });
  });
};

// ─── REPLY ───
window.setReply = (id, user, text) => {
  replyTo = { id, user, text };
  document.getElementById('replyBarName').textContent = user.split('@')[0];
  document.getElementById('replyBarText').textContent = text;
  document.getElementById('replyBar').classList.add('visible');
  document.getElementById('msgInput').focus();
};
window.cancelReply = () => {
  replyTo = null;
  document.getElementById('replyBar').classList.remove('visible');
};

// ─── INPUT ───
window.handleInput = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim();
  document.getElementById('composerBox').classList.toggle('focused', document.activeElement === el);
  // typing
  clearTimeout(typingTimeout);
  if (el.value.trim() && currentUser) {
    setDoc(doc(db, 'presence', currentUser.uid), { typing: true }, { merge: true });
    typingTimeout = setTimeout(clearTypingIndicator, 2500);
  } else clearTypingIndicator();
};

window.handleKey = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

document.getElementById('msgInput').addEventListener('focus', () => {
  document.getElementById('composerBox').classList.add('focused');
});
document.getElementById('msgInput').addEventListener('blur', () => {
  if (!document.getElementById('msgInput').value) {
    document.getElementById('composerBox').classList.remove('focused');
  }
});

function clearTypingIndicator() {
  if (currentUser) setDoc(doc(db, 'presence', currentUser.uid), { typing: false }, { merge: true });
}

// ─── EMOJI ───
const EMOJI_CATS = {
  'Smileys': [128512,128528], 'People': [128528,128591], 'Animals': [128048,128064],
  'Food': [127813,127867], 'Travel': [9981,9999], 'Objects': [128240,128260], 'Symbols': [9654,9680]
};
let allEmojis = [];

window.loadEmojis = () => {
  allEmojis = [];
  for (let i = 128512; i < 129500; i++) {
    try { const e = String.fromCodePoint(i); if (e) allEmojis.push(e); } catch(e) {}
  }
  renderEmojiGrid(allEmojis.slice(0, 200));
};

function renderEmojiGrid(emojis) {
  document.getElementById('emojiGrid').innerHTML = emojis.map(e =>
    `<div class="emoji-item" onclick="insertEmoji('${e}')">${e}</div>`
  ).join('');
}

window.filterEmojis = (q) => {
  if (!q) { renderEmojiGrid(allEmojis.slice(0,200)); return; }
  renderEmojiGrid(allEmojis.filter(() => true).slice(0, 80));
};
window.insertEmoji = (e) => {
  const input = document.getElementById('msgInput');
  input.value += e;
  handleInput(input);
  togglePicker('emojiPicker');
  input.focus();
};

// ─── GIF ───
window.loadGifs = async (q = 'trending') => {
  try {
    const url = q === 'trending'
      ? `https://tenor.googleapis.com/v2/featured?key=${TENOR_KEY}&limit=18`
      : `https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(q)}&key=${TENOR_KEY}&limit=18`;
    const r = await fetch(url);
    const d = await r.json();
    document.getElementById('gifGrid').innerHTML = (d.results || []).map(g =>
      `<div class="gif-item" onclick="sendMessage('${g.media_formats.tinygif.url}','gif')">
        <img src="${g.media_formats.tinygif.url}" loading="lazy">
      </div>`
    ).join('');
  } catch(e) {}
};

let gifDebounce;
window.searchGifs = (q) => {
  clearTimeout(gifDebounce);
  gifDebounce = setTimeout(() => loadGifs(q || 'trending'), 400);
};

// ─── PICKER TOGGLE ───
window.togglePicker = (id) => {
  const el = document.getElementById(id);
  const visible = el.classList.contains('visible');
  closeAllPickers();
  if (!visible) el.classList.add('visible');
};
function closeAllPickers() {
  ['emojiPicker','gifPicker','themePicker'].forEach(id => document.getElementById(id).classList.remove('visible'));
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.composer-inner') && !e.target.closest('.reaction-picker')) closeAllPickers();
});

// ─── THEME ───
window.setTheme = (theme, el) => {
  document.body.className = theme === 'default' ? '' : `theme-${theme}`;
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  closeAllPickers();
  showToast('Theme updated');
};

// ─── TOAST ───
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
};
</script>
</body>
</html>
